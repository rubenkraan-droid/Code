<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recravas Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg:      #0F172A;
      --card:    #1E293B;
      --border:  #334155;
      --text:    #F1F5F9;
      --muted:   #94A3B8;
      --blue:    #3B82F6;
      --green:   #10B981;
      --amber:   #F59E0B;
      --purple:  #A78BFA;
      --red:     #F87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

    /* ── Role switcher ── */
    .role-switch { display: flex; gap: 6px; }
    .role-switch-btn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); cursor: pointer; font-size: 12px; padding: 5px 14px;
      transition: all .15s;
    }
    .role-switch-btn:hover { border-color: var(--blue); color: var(--blue); }
    .role-switch-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }

    /* ── Dashboard ── */
    #dashboard { display: none; }
    .top-bar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .top-bar-left { display: flex; align-items: center; gap: 12px; }
    .top-bar-logo { font-size: 16px; font-weight: 700; }
    .role-badge {
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
      background: rgba(59,130,246,.15); color: var(--blue); border: 1px solid rgba(59,130,246,.3);
    }
    .role-badge.owner  { background: rgba(16,185,129,.15); color: var(--green); border-color: rgba(16,185,129,.3); }
    .role-badge.admin  { background: rgba(167,139,250,.15); color: var(--purple); border-color: rgba(167,139,250,.3); }
    .top-bar-right { display: flex; align-items: center; gap: 14px; }
    .user-name { color: var(--muted); font-size: 13px; }
    .logout-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 12px; padding: 5px 12px; }
    .logout-btn:hover { color: var(--text); border-color: var(--text); }

    .main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

    /* ── Period picker ── */
    .period-bar { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    .period-btn {
      background: var(--card); border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); cursor: pointer; font-size: 12px; padding: 6px 14px;
    }
    .period-btn.active, .period-btn:hover { border-color: var(--blue); color: var(--blue); background: rgba(59,130,246,.08); }
    .period-label { color: var(--muted); font-size: 12px; margin-left: auto; }

    /* ── Section title ── */
    .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; margin-top: 28px; }

    /* ── KPI cards ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .kpi-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px;
    }
    .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .kpi-value { font-size: 26px; font-weight: 700; }
    .kpi-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .kpi-up    { color: var(--green); }
    .kpi-down  { color: var(--red); }

    /* ── Table ── */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-top: 14px; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
    tbody td { padding: 11px 16px; border-bottom: 1px solid rgba(51,65,85,.5); font-size: 13px; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,.02); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Benchmark bar ── */
    .bench-row { display: flex; align-items: center; gap: 10px; }
    .bench-bar-wrap { flex: 1; background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
    .bench-bar { height: 100%; border-radius: 4px; background: var(--blue); }
    .bench-bar.above { background: var(--green); }
    .bench-bar.below { background: var(--amber); }
    .bench-pct { font-size: 12px; font-weight: 600; min-width: 50px; text-align: right; }
    .bench-pct.above { color: var(--green); }
    .bench-pct.below { color: var(--amber); }

    /* ── Park cards ── */
    .park-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 14px; }
    .park-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .park-card-name { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .park-stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .park-stat-label { color: var(--muted); font-size: 12px; }
    .park-stat-val { font-size: 13px; font-weight: 600; }

    .empty { color: var(--muted); font-size: 13px; padding: 24px; text-align: center; }
  </style>
</head>
<body>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="top-bar-logo">Recravas</div>
      <span class="role-badge" id="role-badge">—</span>
    </div>
    <div class="top-bar-right">
      <div class="role-switch">
        <button class="role-switch-btn active" onclick="switchRole('admin')">Admin</button>
        <button class="role-switch-btn" onclick="switchRole('owner')">Park eigenaar</button>
        <button class="role-switch-btn" onclick="switchRole('agent')">Makelaar</button>
      </div>
    </div>
  </div>

  <div class="main">
    <!-- Period picker -->
    <div class="period-bar">
      <button class="period-btn active" data-days="7">7 dagen</button>
      <button class="period-btn" data-days="30">30 dagen</button>
      <button class="period-btn" data-days="90">Kwartaal</button>
      <button class="period-btn" data-days="365">Jaar</button>
      <span class="period-label" id="period-label-text"></span>
    </div>

    <!-- ADMIN VIEW -->
    <div id="view-admin" style="display:none">
      <div class="section-title">Overzicht alle parken</div>
      <div class="kpi-grid" id="admin-kpis"></div>
      <div class="section-title">Per makelaar</div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Makelaar</th>
            <th class="num">Leads</th>
            <th class="num">Afspraken</th>
            <th class="num">Sales</th>
            <th class="num">Omzet</th>
            <th class="num">Sluitratio</th>
          </tr></thead>
          <tbody id="admin-agent-tbody"></tbody>
        </table>
      </div>
      <div class="section-title">Per park × makelaar</div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Park</th><th>Makelaar</th>
            <th class="num">Afspraken</th>
            <th class="num">Sales</th>
            <th class="num">Omzet</th>
          </tr></thead>
          <tbody id="admin-park-agent-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- PARK OWNER VIEW -->
    <div id="view-owner" style="display:none">
      <div class="section-title" id="owner-park-title">Mijn park</div>
      <div class="kpi-grid" id="owner-kpis"></div>
    </div>

    <!-- MAKELAAR VIEW -->
    <div id="view-agent" style="display:none">
      <!-- Personal KPIs -->
      <div class="section-title">Mijn prestaties</div>
      <div class="kpi-grid" id="agent-kpis"></div>

      <!-- Benchmark -->
      <div class="section-title">Jij vs gemiddelde</div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Metric</th>
            <th class="num">Jij</th>
            <th class="num">Gemiddelde</th>
            <th style="width:160px">Verhouding</th>
          </tr></thead>
          <tbody id="bench-tbody"></tbody>
        </table>
      </div>

      <!-- Park totals (no spend) -->
      <div class="section-title">Parken</div>
      <div class="park-grid" id="agent-parks"></div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://ooqkpazyvohsrdvxfnug.supabase.co';
const SUPABASE_KEY = 'sb_publishable_fkVuhCNu_Q0Ze9x5VPee1g_jtzClD0O';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let state = { days: 7, role: 'admin' };

// ── Helpers ────────────────────────────────────────────────
const fEur  = v => v == null ? '—' : '€' + Math.round(v).toLocaleString('nl-NL');
const fNum  = v => v == null ? '—' : Number(v).toLocaleString('nl-NL');
const fPct  = v => v == null ? '—' : Math.round(v) + '%';

function dateRange(days) {
  const to   = new Date();
  const from = new Date();
  from.setDate(from.getDate() - days + 1);
  const fmt = d => d.toISOString().slice(0, 10);
  return { from: fmt(from), to: fmt(to) };
}

function show(id)  { document.getElementById(id).style.display = ''; }
function hide(id)  { document.getElementById(id).style.display = 'none'; }
function text(id, v) { document.getElementById(id).textContent = v; }

// ── Demo data ──────────────────────────────────────────────
const DEMO = {
  agents: [
    { agent: 'Willem de Boer',  leads: 18, appointments: 6, sales: 2, revenue: 98000 },
    { agent: 'André Visser',    leads: 12, appointments: 4, sales: 1, revenue: 52000 },
    { agent: 'Walter Smits',    leads: 21, appointments: 7, sales: 3, revenue: 147000 },
    { agent: 'Sem Jansen',      leads:  9, appointments: 2, sales: 0, revenue: 0      },
  ],
  parkAgent: [
    { park: 'Park Zonnedael',  agent: 'Willem de Boer', appointments: 4, sales: 1, revenue: 52000 },
    { park: 'Park Zonnedael',  agent: 'André Visser',   appointments: 4, sales: 1, revenue: 52000 },
    { park: 'Park Maasduinen', agent: 'Walter Smits',   appointments: 7, sales: 3, revenue: 147000 },
    { park: 'Park Bosrijk',    agent: 'Willem de Boer', appointments: 2, sales: 1, revenue: 46000 },
    { park: 'Park Bosrijk',    agent: 'Sem Jansen',     appointments: 2, sales: 0, revenue: 0     },
  ],
  parks: [
    { park: 'Park Zonnedael',  spend: 3200, leads: 18, appointments: 8, sales: 2, revenue: 104000 },
    { park: 'Park Maasduinen', spend: 2800, leads: 14, appointments: 7, sales: 3, revenue: 147000 },
    { park: 'Park Bosrijk',    spend: 1900, leads: 11, appointments: 5, sales: 1, revenue: 46000  },
  ],
  me: { leads: 18, appointments: 6, sales: 2, revenue: 98000 },
  parkAvg: { leads: 10.3, appointments: 3.5, sales: 1.0 },
};

// ── Role switcher ──────────────────────────────────────────
function switchRole(role) {
  state.role = role;
  document.querySelectorAll('.role-switch-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const badge = document.getElementById('role-badge');
  hide('view-admin'); hide('view-owner'); hide('view-agent');

  if (role === 'admin') {
    badge.textContent = 'Admin'; badge.className = 'role-badge admin';
    show('view-admin');
  } else if (role === 'owner') {
    badge.textContent = 'Park eigenaar'; badge.className = 'role-badge owner';
    show('view-owner');
  } else {
    badge.textContent = 'Makelaar'; badge.className = 'role-badge';
    show('view-agent');
  }
  loadData();
}

// ── Load data ──────────────────────────────────────────────
function loadData() {
  const { from, to } = dateRange(state.days);
  updatePeriodLabel(from, to);
  if (state.role === 'admin')  loadAdminData();
  if (state.role === 'owner')  loadOwnerData();
  if (state.role === 'agent')  loadAgentData();
}

// ── Admin view ─────────────────────────────────────────────
function loadAdminData() {
  const agents = DEMO.agents;
  const totalLeads = agents.reduce((s, a) => s + a.leads, 0);
  const totalAppt  = agents.reduce((s, a) => s + a.appointments, 0);
  const totalSales = agents.reduce((s, a) => s + a.sales, 0);
  const totalRev   = agents.reduce((s, a) => s + a.revenue, 0);

  document.getElementById('admin-kpis').innerHTML = [
    kpiCard('Leads', fNum(totalLeads), '', '#F59E0B'),
    kpiCard('Afspraken', fNum(totalAppt), '', '#3B82F6'),
    kpiCard('Sales', fNum(totalSales), '', '#10B981'),
    kpiCard('Omzet', fEur(totalRev), '', '#A78BFA'),
  ].join('');

  document.getElementById('admin-agent-tbody').innerHTML = agents.map(a => `<tr>
    <td>${esc(a.agent)}</td>
    <td class="num">${fNum(a.leads)}</td>
    <td class="num">${fNum(a.appointments)}</td>
    <td class="num">${fNum(a.sales)}</td>
    <td class="num">${fEur(a.revenue)}</td>
    <td class="num">${a.appointments > 0 ? fPct(a.sales / a.appointments * 100) : '—'}</td>
  </tr>`).join('');

  document.getElementById('admin-park-agent-tbody').innerHTML = DEMO.parkAgent.map(r => `<tr>
    <td>${esc(r.park)}</td><td>${esc(r.agent)}</td>
    <td class="num">${fNum(r.appointments)}</td>
    <td class="num">${fNum(r.sales)}</td>
    <td class="num">${fEur(r.revenue)}</td>
  </tr>`).join('');
}

// ── Park owner view ────────────────────────────────────────
function loadOwnerData() {
  const parks = DEMO.parks;
  const totalSpend = parks.reduce((s, p) => s + p.spend, 0);
  const totalLeads = parks.reduce((s, p) => s + p.leads, 0);
  const totalAppt  = parks.reduce((s, p) => s + p.appointments, 0);
  const totalSales = parks.reduce((s, p) => s + p.sales, 0);
  const totalRev   = parks.reduce((s, p) => s + p.revenue, 0);

  text('owner-park-title', 'Mijn parken');
  document.getElementById('owner-kpis').innerHTML = [
    kpiCard('Ad spend', fEur(totalSpend), '', '#3B82F6'),
    kpiCard('Leads', fNum(totalLeads), '', '#F59E0B'),
    kpiCard('Afspraken', fNum(totalAppt), '', '#3B82F6'),
    kpiCard('Sales', fNum(totalSales), '', '#10B981'),
    kpiCard('Omzet', fEur(totalRev), '', '#A78BFA'),
    kpiCard('CPL', totalLeads > 0 ? fEur(totalSpend / totalLeads) : '—', '', '#94A3B8'),
  ].join('');
}

// ── Makelaar view ──────────────────────────────────────────
function loadAgentData() {
  const me = DEMO.me;
  const avg = DEMO.parkAvg;

  document.getElementById('agent-kpis').innerHTML = [
    kpiCard('Mijn leads', fNum(me.leads), '', '#F59E0B'),
    kpiCard('Mijn afspraken', fNum(me.appointments), '', '#3B82F6'),
    kpiCard('Mijn sales', fNum(me.sales), '', '#10B981'),
    kpiCard('Mijn omzet', fEur(me.revenue), '', '#A78BFA'),
    kpiCard('Sluitratio', me.appointments > 0 ? fPct(me.sales / me.appointments * 100) : '—', '', '#94A3B8'),
  ].join('');

  document.getElementById('bench-tbody').innerHTML = [
    benchRow('Leads',     me.leads,        avg.leads),
    benchRow('Afspraken', me.appointments, avg.appointments),
    benchRow('Sales',     me.sales,        avg.sales),
  ].join('');

  document.getElementById('agent-parks').innerHTML = DEMO.parks.map(p => `
    <div class="park-card">
      <div class="park-card-name">${esc(p.park)}</div>
      <div class="park-stat-row"><span class="park-stat-label">Leads</span><span class="park-stat-val">${fNum(p.leads)}</span></div>
      <div class="park-stat-row"><span class="park-stat-label">Afspraken</span><span class="park-stat-val">${fNum(p.appointments)}</span></div>
      <div class="park-stat-row"><span class="park-stat-label">Sales</span><span class="park-stat-val">${fNum(p.sales)}</span></div>
      <div class="park-stat-row"><span class="park-stat-label">Omzet</span><span class="park-stat-val">${fEur(p.revenue)}</span></div>
    </div>
  `).join('');
}

// ── UI helpers ─────────────────────────────────────────────
function kpiCard(label, value, sub, color) {
  return `<div class="kpi-card">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value" style="color:${color}">${value}</div>
    ${sub ? `<div class="kpi-sub">${sub}</div>` : ''}
  </div>`;
}

function benchRow(label, mine, avg) {
  const ratio = avg > 0 ? mine / avg : (mine > 0 ? 2 : 1);
  const pct   = Math.min(ratio * 100, 200);
  const above = mine >= avg;
  const diff  = avg > 0 ? Math.round((mine - avg) / avg * 100) : 0;
  const barW  = Math.min(pct / 2, 100);
  const cls   = above ? 'above' : 'below';
  const sign  = diff > 0 ? '+' : '';
  return `<tr>
    <td>${label}</td>
    <td class="num">${fNum(mine)}</td>
    <td class="num">${avg > 0 ? Math.round(avg * 10) / 10 : '—'}</td>
    <td>
      <div class="bench-row">
        <div class="bench-bar-wrap"><div class="bench-bar ${cls}" style="width:${barW}%"></div></div>
        <span class="bench-pct ${cls}">${avg > 0 ? sign + diff + '%' : '—'}</span>
      </div>
    </td>
  </tr>`;
}

function updatePeriodLabel(from, to) {
  const fmt = d => new Date(d).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
  text('period-label-text', `${fmt(from)} – ${fmt(to)}`);
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Period buttons ─────────────────────────────────────────
document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.days = parseInt(btn.dataset.days);
    loadData();
  });
});

// ── Init ───────────────────────────────────────────────────
show('dashboard');
const badge = document.getElementById('role-badge');
badge.textContent = 'Admin'; badge.className = 'role-badge admin';
show('view-admin');
loadData();
</script>
</body>
</html>
