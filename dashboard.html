<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recraparcs Dashboard</title>
<style>
  :root{--bg:#f6f6f4;--card:#fff;--ink:#1d1d1b;--muted:#6b6b66;--line:#e6e6e1;
    --accent:#185fa5;--good:#0f6e56;--bad:#a32d2d}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;line-height:1.5}
  .wrap{max-width:1040px;margin:0 auto;padding:24px 20px 64px}
  .top{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  h1{font-size:20px;font-weight:600;margin:0}
  .sub{font-size:13px;color:var(--muted);margin:2px 0 0}
  .who{font-size:13px;color:var(--muted)}
  .who button{margin-left:10px;border:1px solid var(--line);background:#fff;border-radius:7px;
    padding:6px 11px;font:inherit;font-size:13px;cursor:pointer}
  .filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px}
  select,input{font:inherit;font-size:14px;padding:9px 10px;border:1px solid var(--line);
    border-radius:8px;background:#fff;color:var(--ink);min-width:150px}
  .banner{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin:0 0 10px}
  .banner.hide{color:var(--bad)}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:26px}
  .metric{background:#efefe9;border-radius:10px;padding:14px 16px}
  .metric .l{font-size:13px;color:var(--muted);margin-bottom:6px}
  .metric .v{font-size:23px;font-weight:600}
  .sec{font-size:14px;font-weight:600;margin:0 0 10px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:26px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:11px 12px;text-align:right}
  th:first-child,td:first-child{text-align:left}
  thead tr{background:#faf9f6}
  th{font-weight:600;color:var(--muted)}
  tbody tr{border-top:1px solid var(--line)}
  .av{display:inline-flex;align-items:center;gap:8px}
  .dot{width:26px;height:26px;border-radius:50%;background:#e6f1fb;color:#185fa5;display:inline-flex;
    align-items:center;justify-content:center;font-size:11px;font-weight:600}
  .good{color:var(--good)}.bad{color:var(--bad)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  @media(max-width:720px){.grid2{grid-template-columns:1fr}}
  .chartbox{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .inv{display:flex;gap:18px}.inv div{flex:1;text-align:center}
  .inv .v{font-size:22px;font-weight:600}.inv .l{font-size:12px;color:var(--muted)}
  .foot{font-size:12px;color:var(--muted);margin-top:8px}
  /* login */
  #gate{max-width:380px;margin:12vh auto;background:#fff;border:1px solid var(--line);
    border-radius:14px;padding:28px 26px;text-align:center}
  #gate h2{font-size:18px;margin:0 0 6px}
  #gate p{font-size:14px;color:var(--muted);margin:0 0 18px}
  #gate input{width:100%;margin-bottom:12px}
  #gate button{width:100%;background:var(--accent);color:#fff;border:0;border-radius:8px;
    padding:11px;font:inherit;font-size:15px;font-weight:600;cursor:pointer}
  #gateMsg{font-size:13px;margin-top:14px;min-height:18px}
  .hidden{display:none}
</style>
</head>
<body>

<div id="gate" class="hidden">
  <h2>Recraparcs Dashboard</h2>
  <p>Vul je e-mailadres in. Je ontvangt een inloglink in je mailbox.</p>
  <input type="email" id="email" placeholder="jij@voorbeeld.nl" autocomplete="email" />
  <button id="sendLink">Stuur inloglink</button>
  <div id="gateMsg"></div>
</div>

<div id="app" class="wrap hidden">
  <div class="top">
    <div>
      <h1 id="title">Dashboard</h1>
      <p class="sub" id="subtitle"></p>
    </div>
    <div class="who"><span id="whoami"></span><button id="logout">Uitloggen</button></div>
  </div>

  <div class="filters">
    <select id="fPeriod">
      <option value="7">Laatste 7 dagen</option>
      <option value="30" selected>Laatste 30 dagen</option>
      <option value="month">Deze maand</option>
      <option value="year">Dit jaar</option>
      <option value="all">All-time</option>
      <option value="custom">Aangepast…</option>
    </select>
    <input type="date" id="fFrom" class="hidden" />
    <input type="date" id="fTo" class="hidden" />
    <select id="fPark"></select>
    <select id="fAgent"></select>
  </div>

  <div class="banner" id="bannerTop"></div>
  <div class="cards" id="cardsTop"></div>

  <div id="ownerOnly" class="hidden">
    <div class="banner hide"><span>●</span><span>Alleen voor eigenaar · nooit zichtbaar voor klant</span></div>
    <div class="sec">Per agent</div>
    <div class="panel"><table id="agentTable"></table></div>
    <div class="grid2">
      <div>
        <div class="sec">Omzet per park</div>
        <div class="chartbox"><canvas id="parkChart" height="200"></canvas></div>
      </div>
      <div>
        <div class="sec">Inventaris</div>
        <div class="chartbox"><div class="inv" id="invBox"></div><p class="foot" id="invFoot"></p></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ---------- config ---------- */
const SUPABASE_URL = "https://ooqkpazyvohsrdvxfnug.supabase.co";
const SUPABASE_KEY = "sb_publishable_fkVuhCNu_Q0Ze9x5VPee1g_jtzClD0O";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ---------- helpers ---------- */
const $ = id => document.getElementById(id);
const eur = n => "€"+Math.round(n||0).toLocaleString("nl-NL");
const initials = n => n.slice(0,2).toUpperCase();
let ACCESS = null;            // { isOwner, parks:[{id,name}] }

function periodRange(){
  const v = $("fPeriod").value, today = new Date();
  let from, to = today;
  if(v==="all") from = new Date("2000-01-01");
  else if(v==="month") from = new Date(today.getFullYear(), today.getMonth(), 1);
  else if(v==="year") from = new Date(today.getFullYear(), 0, 1);
  else if(v==="custom"){
    from = new Date($("fFrom").value || Date.now()-2592e6);
    to   = new Date($("fTo").value || Date.now());
  } else { from = new Date(); from.setDate(from.getDate()-parseInt(v,10)); }
  const iso = d => d.toISOString().slice(0,10);
  return { p_from: iso(from), p_to: iso(to) };
}
const metric = (l,v) => `<div class="metric"><div class="l">${l}</div><div class="v">${v}</div></div>`;
async function rpc(fn, args){ const {data,error} = await sb.rpc(fn, args||{});
  if(error){ console.error(fn, error); return null; } return data; }

/* ---------- auth ---------- */
$("sendLink").addEventListener("click", async () => {
  const email = $("email").value.trim();
  if(!email){ $("gateMsg").textContent = "Vul je e-mailadres in."; return; }
  $("gateMsg").style.color = "var(--muted)";
  $("gateMsg").textContent = "Versturen…";
  const { error } = await sb.auth.signInWithOtp({
    email, options:{ emailRedirectTo: location.href.split("#")[0] } });
  $("gateMsg").style.color = error ? "var(--bad)" : "var(--good)";
  $("gateMsg").textContent = error ? error.message
    : "Gelukt. Check je mailbox en klik op de inloglink.";
});
$("logout").addEventListener("click", async () => { await sb.auth.signOut(); location.reload(); });

async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ $("gate").classList.remove("hidden"); return; }
  $("whoami").textContent = session.user.email;

  const acc = await rpc("my_access");
  if(!acc || acc.length===0){
    $("gate").classList.add("hidden"); $("app").classList.remove("hidden");
    $("title").textContent = "Geen toegang";
    $("subtitle").textContent = "Je login is bekend maar nog niet gekoppeld. Neem contact op met Ruben.";
    return;
  }
  ACCESS = acc[0].is_owner
    ? { isOwner:true, parks:[] }
    : { isOwner:false, parks: acc.map(r=>({id:r.park_id, name:r.park_name})) };

  $("gate").classList.add("hidden"); $("app").classList.remove("hidden");
  ACCESS.isOwner ? await initOwner() : await initClient();
}
sb.auth.onAuthStateChange((_e,s)=>{ if(s && $("app").classList.contains("hidden")) boot(); });

/* ---------- filters wiring ---------- */
function fillSelect(el, opts, allLabel){
  el.innerHTML = (allLabel?`<option value="all">${allLabel}</option>`:"")
    + opts.map(o=>`<option value="${o.value}">${o.label}</option>`).join("");
}
$("fPeriod").addEventListener("change", e=>{
  const show = e.target.value==="custom";
  $("fFrom").classList.toggle("hidden",!show); $("fTo").classList.toggle("hidden",!show);
  refresh();
});
let refresh = ()=>{};
["fFrom","fTo","fPark","fAgent"].forEach(id=>$(id).addEventListener("change", ()=>refresh()));

/* ---------- OWNER ---------- */
async function initOwner(){
  $("title").textContent = "Master dashboard";
  $("subtitle").textContent = "Eigenaarweergave";
  $("bannerTop").innerHTML = "";
  $("ownerOnly").classList.remove("hidden");
  $("fAgent").classList.remove("hidden");

  const parks = await rpc("owner_parks") || [];
  const agents = await rpc("owner_agents") || [];
  fillSelect($("fPark"), parks.map(p=>({value:p.id,label:p.name})), "Alle parken");
  fillSelect($("fAgent"), agents.map(a=>({value:a.id,label:a.name})), "Alle agents");

  refresh = renderOwner;
  await renderOwner();
}

async function renderOwner(){
  const r = periodRange();
  const parkVal = $("fPark").value, agentVal = $("fAgent").value;

  // top cards: agency total, or one park if selected
  let f;
  if(parkVal==="all") f = (await rpc("owner_total_funnel", r))?.[0];
  else f = (await rpc("client_park_funnel", {p_park_id:Number(parkVal), ...r}))?.[0];
  f = f || {};
  const closing = f.closing_rate_pct ?? (f.appointments ? Math.round(f.sales/f.appointments*100) : 0);
  $("cardsTop").innerHTML =
    metric("Uitgaven",eur(f.spend)) + metric("Leads",f.leads||0) +
    metric("Afspraken",f.appointments||0) + metric("Sales",f.sales||0) +
    metric("Omzet",eur(f.revenue)) + metric("CPL",eur(f.cost_per_lead)) +
    metric("ROAS",Number(f.roas||0).toFixed(2)) + metric("Closing %",(closing||0)+"%");

  // per agent
  let agents = await rpc("owner_agent_performance", r) || [];
  if(agentVal!=="all") agents = agents.filter(a=>String(a.agent_id)===agentVal);
  $("agentTable").innerHTML =
    `<thead><tr><th>Agent</th><th>Afspraken</th><th>Closing %</th><th>€/afspraak</th><th>Omzet</th></tr></thead>
     <tbody>${agents.map(a=>{
       const cls = a.closing_rate_pct>=40?"good":a.closing_rate_pct<30?"bad":"";
       return `<tr><td><span class="av"><span class="dot">${initials(a.agent)}</span>${a.agent}</span></td>
         <td>${a.appointments}</td><td class="${cls}">${a.closing_rate_pct}%</td>
         <td>${eur(a.revenue_per_appt)}</td><td style="font-weight:600">${eur(a.revenue)}</td></tr>`;
     }).join("")}</tbody>`;

  // chart: revenue per park by agent
  const pa = await rpc("owner_park_agent", r) || [];
  const parkNames = [...new Set(pa.map(x=>x.park))];
  const agentNames = [...new Set(pa.map(x=>x.agent))];
  const palette = ["#185fa5","#85b7eb","#b5d4f4","#0f6e56","#5dcaa5"];
  const datasets = agentNames.map((ag,i)=>({
    label:ag, backgroundColor:palette[i%palette.length],
    data: parkNames.map(pn => Number((pa.find(x=>x.park===pn&&x.agent===ag)||{}).revenue)||0)
  }));
  drawChart(parkNames.map(n=>n.replace("Park ","")), datasets);

  // inventory (selected park or sum of all)
  const invParks = parkVal==="all" ? (await rpc("owner_parks")||[]).map(p=>p.id) : [Number(parkVal)];
  let sold=0,res=0,av=0;
  for(const pid of invParks){
    const inv = (await rpc("client_park_inventory",{p_park_id:pid}))?.[0];
    if(inv){ sold+=Number(inv.sold); res+=Number(inv.reserved); av+=Number(inv.available); }
  }
  renderInv(sold,res,av);
}

/* ---------- CLIENT ---------- */
async function initClient(){
  $("ownerOnly").classList.add("hidden");
  $("fAgent").classList.add("hidden");
  $("title").textContent = "Park dashboard";
  $("subtitle").textContent = "Klantweergave";
  $("bannerTop").innerHTML = "";
  fillSelect($("fPark"), ACCESS.parks.map(p=>({value:p.id,label:p.name})), null);
  $("fPark").disabled = ACCESS.parks.length<=1;
  refresh = renderClient;
  await renderClient();
}

async function renderClient(){
  const r = periodRange();
  const pid = Number($("fPark").value);
  const f = (await rpc("client_park_funnel", {p_park_id:pid, ...r}))?.[0] || {};
  $("subtitle").textContent = "Klantweergave · "+(f.park||"");
  $("cardsTop").innerHTML =
    metric("Uitgaven",eur(f.spend)) + metric("Leads",f.leads||0) +
    metric("Afspraken",f.appointments||0) + metric("Sales",f.sales||0) +
    metric("Omzet",eur(f.revenue)) + metric("CPL",eur(f.cost_per_lead)) +
    metric("ROAS",Number(f.roas||0).toFixed(2)) +
    metric("Closing %",(f.appointments?Math.round(f.sales/f.appointments*100):0)+"%");
}

/* ---------- shared render bits ---------- */
let chart;
function drawChart(labels, datasets){
  if(chart) chart.destroy();
  chart = new Chart($("parkChart"), {
    type:"bar", data:{labels, datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:"bottom",labels:{boxWidth:10,font:{size:11}}}},
      scales:{x:{stacked:true,grid:{display:false}},
              y:{stacked:true,ticks:{callback:v=>"€"+(v/1000)+"k"}}}}
  });
}
function renderInv(sold,res,av){
  $("invBox").innerHTML =
    `<div><div class="v">${sold}</div><div class="l">Verkocht</div></div>
     <div><div class="v">${res}</div><div class="l">Gereserveerd</div></div>
     <div><div class="v">${av}</div><div class="l">Beschikbaar</div></div>`;
  const t = sold+res+av;
  $("invFoot").textContent = t ? Math.round(sold/t*100)+"% verkocht" : "";
}

boot();
</script>
</body>
</html>
