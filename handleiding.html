<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RecraVas — Handleiding & functie-overzicht</title>
<style>
  :root{ --bg:#f6f3ec; --card:#fffdf8; --ink:#1d1d1b; --muted:#6b6b66; --line:#e6e2d6;
    --line-strong:#d8d2c2; --accent:#2C5F52; --serif:Georgia,"Times New Roman",serif; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6; }
  .wrap{ max-width:860px; margin:0 auto; padding:28px 22px 80px; }
  .top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .back{ color:var(--accent); text-decoration:none; font-weight:600; font-size:14px; }
  .back:hover{ text-decoration:underline; }
  #content h1{ font-family:var(--serif); font-weight:600; font-size:30px; margin:18px 0 6px; }
  #content h2{ font-family:var(--serif); font-weight:600; font-size:22px; margin:34px 0 8px;
    padding-bottom:6px; border-bottom:1px solid var(--line); }
  #content h3{ font-size:16px; margin:22px 0 4px; }
  #content p{ margin:10px 0; }
  #content a{ color:var(--accent); }
  #content ul{ margin:10px 0; padding-left:22px; }
  #content li{ margin:4px 0; }
  #content code{ background:#efe9db; border-radius:5px; padding:1px 5px; font-size:.9em; }
  #content pre{ background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:14px; overflow-x:auto; font-size:12.5px; }
  #content pre code{ background:none; padding:0; }
  #content table{ border-collapse:collapse; width:100%; margin:14px 0; font-size:14px;
    background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  #content th,#content td{ text-align:left; padding:9px 12px; border-bottom:1px solid var(--line);
    vertical-align:top; }
  #content th{ background:#efe9db; font-weight:600; }
  #content tr:last-child td{ border-bottom:none; }
  #content blockquote{ margin:12px 0; padding:8px 14px; border-left:3px solid var(--line-strong);
    color:var(--muted); background:var(--card); border-radius:0 8px 8px 0; }
  .laad{ color:var(--muted); padding:40px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><a class="back" href="index.html">← Terug naar dashboard</a></div>
  <div id="content"><p class="laad">Handleiding laden…</p></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
  fetch("HANDLEIDING.md?v=" + Date.now())
    .then(r => { if(!r.ok) throw new Error(r.status); return r.text(); })
    .then(md => { document.getElementById("content").innerHTML = marked.parse(md); document.title = "RecraVas — Handleiding"; })
    .catch(() => { document.getElementById("content").innerHTML =
      '<p class="laad">Kon de handleiding niet laden. Open <a href="HANDLEIDING.md">HANDLEIDING.md</a> rechtstreeks.</p>'; });
</script>
</body>
</html>
